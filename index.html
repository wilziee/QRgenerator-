<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaerisoft QR Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           CSS: PREMIUM UNIVERSE & GLOW EFFECTS 
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #050505;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Biar ga ada scroll aneh */
            position: relative;
        }

        /* --- Background Luar Angkasa --- */
        #universe-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }

        .stars {
            width: 1px; height: 1px;
            background: transparent;
            box-shadow: 174px 123px #FFF, 345px 567px #FFF, 890px 345px #FFF, 123px 890px #FFF, 543px 234px #FFF, 987px 654px #FFF;
            animation: animStar 50s linear infinite;
        }
        .stars::after {
            content: " "; position: absolute; top: 2000px;
            width: 1px; height: 1px; background: transparent;
            box-shadow: 174px 123px #FFF, 345px 567px #FFF, 890px 345px #FFF, 123px 890px #FFF;
        }
        @keyframes animStar {
            from { transform: translateY(0px); }
            to { transform: translateY(-2000px); }
        }

        /* Efek Nebula (Cahaya di background) */
        .nebula {
            position: absolute;
            width: 300px; height: 300px;
            background: #00d2ff;
            filter: blur(150px);
            opacity: 0.2;
            top: 10%; left: 20%;
            border-radius: 50%;
            animation: pulseNebula 8s infinite alternate;
        }
        @keyframes pulseNebula {
            0% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1.5); opacity: 0.4; }
        }

        /* --- Glassmorphism Card (Dengan efek Float) --- */
        .glass-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 1;
            animation: floatCard 6s ease-in-out infinite;
        }
        @keyframes floatCard {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header i {
            color: #00d2ff;
            margin-bottom: 12px;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.6);
        }
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }
        .header p {
            font-size: 13px;
            color: #b0b0b0;
            margin-top: 5px;
        }

        /* --- Universal Input --- */
        .input-group {
            margin-bottom: 25px;
        }
        textarea {
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-size: 15px;
            outline: none;
            resize: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        textarea:focus {
            border-color: #00d2ff;
            background: rgba(0,0,0,0.6);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5), 0 0 15px rgba(0, 210, 255, 0.3);
        }
        textarea::placeholder {
            color: #777;
        }

        /* --- Buttons --- */
        button {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.3);
            margin-bottom: 12px;
        }
        .btn-gradient:hover {
            box-shadow: 0 10px 25px rgba(0, 210, 255, 0.5);
            transform: translateY(-2px);
        }
        .btn-gradient:active {
            transform: translateY(1px);
        }
        
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #ccc;
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }

        /* --- QR Box Preview (Dengan efek Glow) --- */
        .qr-wrapper {
            background: white;
            padding: 25px;
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 30px;
            display: none; 
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        #qr-result {
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }
        #qr-result img, #qr-result canvas {
            max-width: 100%;
            height: auto;
        }
        .btn-download {
            background: #0f2027;
            color: white;
            margin-top: 20px;
            width: 100%;
            box-shadow: none;
        }
        .btn-download:hover {
            background: #203a43;
        }

        /* --- Toast Error/Success --- */
        #toast {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 71, 87, 0.9);
            backdrop-filter: blur(5px);
            color: white;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 100;
        }
        #toast.show {
            opacity: 1;
            visibility: visible;
            bottom: 40px;
        }
        #toast.success {
            background: rgba(46, 213, 115, 0.9);
            box-shadow: 0 10px 25px rgba(46, 213, 115, 0.4);
        }
    </style>
</head>
<body>

    <div id="universe-bg">
        <div class="stars"></div>
        <div class="nebula"></div>
    </div>

    <div id="toast">Notifikasi di sini</div>

    <div class="glass-container">
        <div class="header">
            <i class="fa-solid fa-qrcode fa-3x"></i>
            <h1>Xaerisoft QR</h1>
            <p>Fast QR Generator</p>
        </div>

        <div class="input-group">
            <textarea id="qr-input" rows="4" placeholder="Ketik apa saja di sini...&#10;(Link web, Teks panjang, Nomor HP, dll)"></textarea>
        </div>

        <button id="btn-generate" class="btn-gradient">Generate QR Code <i class="fa-solid fa-wand-magic-sparkles"></i></button>
        <button id="btn-reset" class="btn-outline">Reset Form <i class="fa-solid fa-rotate-right"></i></button>

        <div class="qr-wrapper" id="qr-wrapper">
            <div id="qr-result"></div>
            <button id="btn-dl-png" class="btn-download">Simpan Gambar <i class="fa-solid fa-download"></i></button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        const qrInput = document.getElementById("qr-input");
        const btnGenerate = document.getElementById("btn-generate");
        const btnReset = document.getElementById("btn-reset");
        const qrWrapper = document.getElementById("qr-wrapper");
        const qrResult = document.getElementById("qr-result");
        const btnDlPng = document.getElementById("btn-dl-png");
        const toast = document.getElementById("toast");

        // Fungsi Notifikasi Animasi Smooth
        function showToast(msg, isSuccess = false) {
            toast.innerText = msg;
            toast.className = isSuccess ? "show success" : "show";
            setTimeout(() => {
                toast.className = toast.className.replace("show", "").trim();
            }, 3000);
        }

        // Kalau user ngetik, sembunyikan QR lama biar ga bingung
        qrInput.addEventListener("input", () => {
            if (qrWrapper.style.display === "flex") {
                qrWrapper.style.display = "none";
            }
        });

        // Proses Generate
        btnGenerate.addEventListener("click", () => {
            const data = qrInput.value.trim();

            if (!data) {
                showToast("⚠️ Bro, isi teksnya dulu ya!");
                // Efek getar dikit kalau kosong
                qrInput.style.transform = "translateX(-5px)";
                setTimeout(() => qrInput.style.transform = "translateX(5px)", 50);
                setTimeout(() => qrInput.style.transform = "translateX(0)", 100);
                return;
            }

            // Reset box QR
            qrResult.innerHTML = "";
            qrWrapper.style.display = "flex";

            // Bikin QR Code
            new QRCode(qrResult, {
                text: data,
                width: 220,
                height: 220,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            showToast("✨ QR Code Berhasil Dibuat!", true);
        });

        // Fitur Reset
        btnReset.addEventListener("click", () => {
            qrInput.value = "";
            qrWrapper.style.display = "none";
            showToast("🔄 Form dibersihkan", true);
        });

        // Fitur Download
        btnDlPng.addEventListener('click', () => {
            const canvas = qrResult.querySelector('canvas');
            if (canvas) {
                const url = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.href = url;
                link.download = 'Xaerisoft-Universal-QR.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast("📥 Berhasil didownload ke HP lu!", true);
            }
        });
    </script>
</body>
</html>
