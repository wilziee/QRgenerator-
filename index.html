<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaerisoft QR - Premium QR Generator</title>
    <!-- Menggunakan CDN Cloudflare yang lebih stabil -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>
    <style>
        :root { --bg-dark: #07050f; --neon-blue: #00f3ff; --neon-purple: #bc13fe; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-dark); color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        .glass-panel { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; }
        .glass-input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(0,0,0,0.3); border: 1px solid #444; color: #fff; border-radius: 8px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-primary { background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); color: #fff; }
        .hidden { display: none; }
        #qr-preview-container { background: #fff; padding: 20px; border-radius: 15px; margin-top: 20px; min-height: 200px; display: flex; align-items: center; justify-content: center; }
        .fade-scale { animation: anim 0.5s ease; }
        @keyframes anim { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color: var(--neon-blue);">Xaerisoft QR</h1>
    <p>Simple • Fast • Modern QR Generator</p>

    <div class="glass-panel">
        <select id="qr-type" class="glass-input">
            <option value="url">URL / Website</option>
            <option value="text">Text</option>
            <option value="whatsapp">WhatsApp</option>
        </select>
        <div id="input-container">
            <input type="text" id="main-input" class="glass-input" placeholder="Masukkan URL...">
        </div>
        <button id="btn-generate" class="btn btn-primary">Generate</button>
    </div>

    <div id="qr-preview-container" class="glass-panel hidden">
        <img id="qr-image" width="200" height="200">
    </div>
</div>

<script>
    const type = document.getElementById('qr-type');
    const input = document.getElementById('main-input');
    const btn = document.getElementById('btn-generate');
    const container = document.getElementById('qr-preview-container');
    const img = document.getElementById('qr-image');

    btn.addEventListener('click', () => {
        let val = input.value;
        if(type.value === 'whatsapp') val = 'https://wa.me/' + val.replace(/\D/g, '');
        
        if(!val) return alert("Isi input dulu!");

        container.classList.remove('hidden');
        QRCode.toDataURL(val, {width: 200}, (err, url) => {
            img.src = url;
            img.classList.add('fade-scale');
        });
    });

    type.addEventListener('change', () => {
        input.placeholder = type.value === 'url' ? 'https://...' : 'Masukkan konten...';
    });
</script>

</body>
</html>
