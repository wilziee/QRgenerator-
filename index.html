<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaerisoft QR - Premium QR Generator</title>
    <link rel="stylesheet" href="style.css">
    <!-- QR Code Library CDN -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
    <!-- Galaxy Background Elements -->
    <div class="stars"></div>
    <div class="twinkling"></div>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="logo glow-text">Xaerisoft QR</h1>
            <p class="subtitle">Simple • Fast • Modern QR Generator</p>
        </header>

        <main class="main-content">
            <!-- Left Panel: Form Input -->
            <section class="glass-panel input-section">
                <div class="form-group">
                    <label for="qr-type">QR Type</label>
                    <select id="qr-type" class="glass-input">
                        <option value="url">🌐 URL / Website</option>
                        <option value="text">📝 Text</option>
                        <option value="whatsapp">💬 WhatsApp</option>
                        <option value="phone">📞 Phone Number</option>
                        <option value="email">✉️ Email</option>
                        <option value="sms">📱 SMS</option>
                        <option value="wifi">📶 WiFi</option>
                        <option value="location">📍 Location</option>
                    </select>
                </div>

                <div id="dynamic-inputs" class="dynamic-inputs">
                    <!-- Input fields will be generated here by JS -->
                </div>

                <div class="action-buttons">
                    <button id="btn-generate" class="btn btn-primary neon-btn">Generate</button>
                    <button id="btn-reset" class="btn btn-secondary glass-btn">Reset</button>
                </div>
            </section>

            <!-- Right Panel: QR Preview -->
            <section class="glass-panel preview-section">
                <div id="loading-state" class="loading-state hidden">
                    <div class="spinner"></div>
                    <p class="glow-text-purple">⚡ Generating QR...</p>
                </div>
                
                <div id="qr-preview-container" class="qr-preview-container">
                    <p id="placeholder-text">Enter details & click Generate</p>
                    <img id="qr-image" class="hidden" alt="QR Code Preview" />
                </div>

                <div id="download-actions" class="download-actions hidden">
                    <button id="btn-download-png" class="btn btn-download png-btn">⬇ PNG</button>
                    <button id="btn-download-svg" class="btn btn-download svg-btn">⬇ SVG</button>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Made by <span class="highlight">Will</span></p>
            <p class="powered">Powered by <span class="glow-text-small">Xaerisoft</span></p>
        </footer>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
