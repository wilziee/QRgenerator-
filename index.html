<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Xaerisoft QR</title>
    <!-- File lokal -->
    <script src="qrcode.min.js"></script>
    <style>
        body { background: #000; color: #fff; text-align: center; padding: 20px; font-family: sans-serif; }
        input { width: 80%; padding: 10px; border-radius: 5px; }
        button { padding: 10px 20px; background: #bc13fe; border: none; color: white; border-radius: 5px; }
        #qr { margin-top: 20px; background: #fff; display: inline-block; padding: 10px; }
    </style>
</head>
<body>
    <h1>Xaerisoft QR</h1>
    <input type="text" id="input" placeholder="Masukkan URL...">
    <button onclick="proses()">Generate</button>
    <div id="qr"><canvas id="canvas"></canvas></div>

    <script>
        function proses() {
            const t = document.getElementById('input').value;
            const c = document.getElementById('canvas');
            if(!t) { alert('Isi input!'); return; }
            if(typeof QRCode === 'undefined') { alert('File qrcode.min.js tidak ditemukan! Pastikan file ada di folder yang sama.'); return; }
            
            QRCode.toCanvas(c, t, {width: 200}, function(err){
                if(err) alert(err);
                else console.log('Sukses!');
            });
        }
    </script>
</body>
</html>
